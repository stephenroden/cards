<section class="home">
  <div class="home-card">
    <h2>Hearts</h2>
    <label class="rule-toggle">
      <input
        #jackToggle
        type="checkbox"
        [checked]="jackOfDiamondsMinus10()"
        (change)="setJackOfDiamondsMinus10(jackToggle.checked)"
      />
      <span>Enable J♦ = -10 variant</span>
    </label>
    <p class="rule-help">When enabled, taking the Jack of Diamonds subtracts 10 points.</p>
    <label class="rule-toggle">
      <input
        #debugToggle
        type="checkbox"
        [checked]="debugAiHistory()"
        (change)="setDebugAiHistory(debugToggle.checked)"
      />
      <span>Enable AI debug history</span>
    </label>
    <p class="rule-help">Shows per-CPU play-by-play reasons during the round. Default on.</p>
    <label class="rule-toggle theme-toggle">
      <span>Color scheme</span>
      <select #themeSelect (change)="setTheme(themeSelect.value)">
        @for (theme of themes; track theme.id) {
          <option [value]="theme.id" [selected]="theme.id === selectedTheme()">{{ theme.label }}</option>
        }
      </select>
    </label>
    <div class="home-actions">
      <a class="primary" routerLink="/game" (click)="startGame()">Start Game</a>
      <a class="ghost" routerLink="/rules">Rules</a>
    </div>
  </div>
</section>
